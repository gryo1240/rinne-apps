<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>存在しない占星術｜あなただけの架空の星座を占う</title>
<meta name="description" content="生年月日から、この世に存在しない「あなただけの架空の星座」を占います。宵乃こよみが星を読みます。登録不要・完全無料。結果はカード画像として保存・共有できます。">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0c0f1d">
<link rel="icon" href="./icon-192.png">
<style>
  :root {
    --indigo:#0c0f1d; --indigo2:#1a2138; --gold:#d9b96a; --gold2:#f0dca8;
    --ink:#e8e4d8; --sub:#9aa3bf;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    background: radial-gradient(1200px 600px at 70% -10%, #232c4d 0%, var(--indigo) 55%);
    color: var(--ink); min-height: 100vh;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 28px 18px 48px; }
  h1 { font-size: 23px; font-weight: 700; color: var(--gold2); text-align: center; letter-spacing: .06em; }
  .subtitle { font-size: 13px; color: var(--sub); text-align: center; margin: 8px 0 20px; line-height: 1.7; }
  .koyomi-intro { text-align: center; margin-bottom: 16px; }
  .koyomi-intro img { max-width: 100%; border-radius: 14px; box-shadow: 0 0 22px rgba(217,185,106,.2); }
  .koyomi-speech {
    background: rgba(26,33,56,.85); border: 1px solid #33406e; border-radius: 12px;
    padding: 14px 16px; margin: 14px 0 20px; font-size: 14.5px; line-height: 1.8;
  }
  .koyomi-speech b { color: var(--gold); }
  form { display: flex; flex-direction: column; gap: 12px; }
  .date-row { display: flex; gap: 8px; }
  .date-row .field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .date-row .field.year { flex: 1.4; }
  label { font-size: 12px; color: var(--sub); letter-spacing: .05em; }
  input {
    width: 100%; border: 1px solid #33406e; border-radius: 10px;
    padding: 11px 12px; font-size: 15px; background: var(--indigo2); color: var(--ink);
    font-family: inherit;
  }
  input::placeholder { color: #5c6584; }
  .name-field { display: flex; flex-direction: column; gap: 4px; }
  button {
    font-family: "Hiragino Kaku Gothic ProN", sans-serif; font-size: 15px; font-weight: 700; cursor: pointer;
    border: none; border-radius: 999px; padding: 14px 24px;
  }
  #genBtn {
    margin-top: 6px; background: linear-gradient(180deg,#3a2f4f,#2a2240); color: var(--gold2);
    border: 1px solid var(--gold); box-shadow: 0 0 14px rgba(217,185,106,.2); letter-spacing: .1em;
  }
  #genBtn:active { transform: scale(.98); }
  .privacy-note { font-size: 11px; color: var(--sub); text-align: center; margin-top: 10px; }

  #resultScreen[hidden], #introScreen[hidden] { display: none; }
  #resultScreen { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  #cardWrap { max-width: 100%; }
  .card-preview { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.4); }
  .today-msg {
    width: 100%; background: rgba(26,33,56,.85); border-left: 3px solid var(--gold);
    border-radius: 0 10px 10px 0; padding: 12px 14px; font-size: 15.5px; line-height: 1.8;
  }
  .today-msg b { color: var(--gold); display: block; font-size: 12.5px; margin-bottom: 4px; letter-spacing: .1em; }
  .action-row { display: flex; gap: 10px; width: 100%; }
  .action-row button { flex: 1; }
  #shareBtn { background: var(--gold2); color: #2a2240; }
  #saveBtn { background: transparent; color: var(--gold2); border: 1px solid var(--gold); }
  #againBtn {
    width: 100%; background: transparent; color: var(--sub); border: 1px solid #33406e; font-size: 13px;
  }
  #shareStatus { font-size: 12px; color: var(--sub); min-height: 1.4em; text-align: center; }
  #shareStatus[hidden] { display: none; }
  .share-fallback { width: 100%; text-align: center; margin-top: 2px; font-family: "Hiragino Kaku Gothic ProN", sans-serif; }
  .share-fallback[hidden] { display: none; }
  .share-fallback p { font-size: 12px; color: var(--sub); margin-bottom: 8px; }
  .share-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .sh { border: none; border-radius: 8px; color: #fff; font-size: 12px; font-weight: bold; padding: 8px 12px; cursor: pointer; min-width: 64px; }
  .sh-x { background: #0f1419; border: 1px solid #3a4048; }
  .sh-threads { background: #101010; border: 1px solid #3a3a3a; }
  .sh-line { background: #06c755; }
  .sh-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .footer-note {
    margin-top: 10px; font-size: 11px; color: var(--sub); text-align: center;
    font-family: "Hiragino Kaku Gothic ProN", sans-serif; line-height: 1.7;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>存在しない占星術</h1>
  <p class="subtitle">この世には存在しない、あなただけの架空の星座を占います</p>

  <div id="introScreen">
    <div class="koyomi-intro">
      <img src="./koyomi-uranai.jpg" alt="夜、水晶玉と月明かりの中で占う宵乃こよみ" loading="lazy">
    </div>
    <div class="koyomi-speech">
      こんばんは、占い師の宵乃(よいの)こよみです。<br>
      今日は、まだ名前のない星を探しに行きましょう。<br>
      生まれた日を教えていただければ、あなただけの星座を読み解きますね。
    </div>

    <form id="inputForm">
      <div class="date-row">
        <div class="field year">
          <label for="birthYear">生まれた年</label>
          <input type="number" id="birthYear" placeholder="1990" min="1900" max="2026" required>
        </div>
        <div class="field">
          <label for="birthMonth">月</label>
          <input type="number" id="birthMonth" placeholder="1" min="1" max="12" required>
        </div>
        <div class="field">
          <label for="birthDay">日</label>
          <input type="number" id="birthDay" placeholder="1" min="1" max="31" required>
        </div>
      </div>
      <div class="name-field">
        <label for="birthName">お名前(空欄でもOK・結果が少し変わります)</label>
        <input type="text" id="birthName" placeholder="例: はな(ニックネームでも可)" maxlength="20">
      </div>
      <button type="submit" id="genBtn">星を読んでもらう</button>
    </form>
    <p class="privacy-note">※入力内容はこの端末の中だけで処理され、外部には送信されません</p>
  </div>

  <div id="resultScreen" hidden>
    <div id="cardWrap"></div>
    <div class="today-msg">
      <b>こよみからの、今日のひとこと</b>
      <span id="todayMsg"></span>
    </div>
    <div class="action-row">
      <button id="shareBtn">シェアする</button>
      <button id="saveBtn">保存する</button>
    </div>
    <p id="shareStatus" hidden></p>
    <div id="shareFallback" class="share-fallback" hidden>
      <p>画像を保存し、文章もコピーしました。下のボタンでSNSを開いて、保存した画像を貼り付けてね</p>
      <div class="share-btns">
        <button id="share-x" class="sh sh-x">X</button>
        <button id="share-threads" class="sh sh-threads">Threads</button>
        <button id="share-line" class="sh sh-line">LINE</button>
        <button id="share-ig" class="sh sh-ig">Instagram</button>
      </div>
    </div>
    <button id="againBtn">別の生年月日でもう一度占う</button>
  </div>

  <p class="footer-note">
    ※すべてエンターテインメントです。実在の占星術・星座とは一切関係ありません。<br>
    未来を断定するものではなく、医療・法律・投資等の助言も行いません。
  </p>
</div>

<script src="./generator.js"></script>
<script src="./app.js"></script>
</body>
</html>
