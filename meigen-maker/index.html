<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>謎の名言メーカー｜それっぽい格言を自動生成</title>
<meta name="description" content="好きな言葉(テーマ)を入れると、実在しない賢者によるそれっぽい格言を自動生成。結果はカード画像として保存・共有できます。登録不要・完全無料。">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#f7f0e3">
<link rel="icon" href="./icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    background: #f7f0e3; color: #2b241c;
  }
  .wrap {
    max-width: 560px; margin: 0 auto; padding: 32px 20px 48px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  h1 { font-size: 25px; font-weight: 800; color: #7a3b2e; text-align: center; letter-spacing: .04em; }
  .subtitle { font-size: 13px; color: #8a7a63; text-align: center; max-width: 340px; margin-bottom: 6px; }
  .input-row { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 10px; }
  input[type=text] {
    width: 100%; border: 2px solid #d9c9a8; border-radius: 10px;
    padding: 12px 14px; font-size: 15px; background: #fffdf8; color: #2b241c;
    font-family: inherit;
  }
  button {
    font-family: "Hiragino Kaku Gothic ProN", sans-serif; font-size: 15px; font-weight: 700; cursor: pointer;
    border: none; border-radius: 999px; padding: 13px 24px;
  }
  #genBtn { background: #7a3b2e; color: #fff8ee; }
  #result { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 8px; }
  #result[hidden] { display: none; }
  #cardWrap { max-width: 100%; }
  .card-preview { max-width: 100%; border-radius: 4px; box-shadow: 0 4px 18px rgba(60, 40, 10, .14); }
  .action-row { display: flex; gap: 12px; }
  #saveBtn, #shareBtn { background: #2b241c; color: #fff; font-family: "Hiragino Kaku Gothic ProN", sans-serif; }
  #saveBtn { background: #fff; color: #2b241c; border: 2px solid #2b241c; }
  #shareStatus { font-size: 12px; color: #a3937a; min-height: 1.4em; text-align: center; }
  #shareStatus[hidden] { display: none; }
  .footer-note {
    margin-top: 20px; font-size: 11px; color: #a3937a; text-align: center; max-width: 340px;
    font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>謎の名言メーカー</h1>
  <p class="subtitle">テーマを入れると、実在しない賢者による、それっぽい格言をお告げします</p>

  <div class="input-row">
    <input type="text" id="subjectInput" placeholder="例: コーヒー / 月曜日 / 推し活(空欄でお任せ)" maxlength="20">
    <button id="genBtn">お告げを受け取る</button>
  </div>

  <div id="result" hidden>
    <div id="cardWrap"></div>
    <div class="action-row">
      <button id="shareBtn">シェアする</button>
      <button id="saveBtn">保存する</button>
    </div>
    <p id="shareStatus" hidden></p>
  </div>

  <p class="footer-note">
    ※すべてエンタメです。実在の人物・思想・宗教とは一切関係ありません
  </p>
</div>

<script src="./generator.js"></script>
<script src="./app.js"></script>
</body>
</html>
