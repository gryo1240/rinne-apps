<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#2E7381">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<body>
<title>せんたくタグ</title>
<style>
:root{
  --bg:#F3F6F5; --surface:#FFFFFF; --ink:#233030; --muted:#68797A;
  --line:#DDE4E2; --accent:#2E7381; --accent-ink:#FFFFFF; --accent-soft:#E2EEF0;
  --warn:#B0563B; --warn-soft:#F6E9E3; --chip:#EAEFED; --ok:#3E7A52;
  --shadow:0 1px 3px rgba(30,45,45,.08);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#141A1A; --surface:#1D2525; --ink:#E4E9E8; --muted:#93A3A3;
    --line:#313B3B; --accent:#6FB3C0; --accent-ink:#0F2226; --accent-soft:#22383D;
    --warn:#D69073; --warn-soft:#3A2A21; --chip:#28322F; --ok:#7FBE97;
    --shadow:0 1px 3px rgba(0,0,0,.35);
  }
}
:root[data-theme="light"]{
  --bg:#F3F6F5; --surface:#FFFFFF; --ink:#233030; --muted:#68797A;
  --line:#DDE4E2; --accent:#2E7381; --accent-ink:#FFFFFF; --accent-soft:#E2EEF0;
  --warn:#B0563B; --warn-soft:#F6E9E3; --chip:#EAEFED; --ok:#3E7A52;
  --shadow:0 1px 3px rgba(30,45,45,.08);
}
:root[data-theme="dark"]{
  --bg:#141A1A; --surface:#1D2525; --ink:#E4E9E8; --muted:#93A3A3;
  --line:#313B3B; --accent:#6FB3C0; --accent-ink:#0F2226; --accent-soft:#22383D;
  --warn:#D69073; --warn-soft:#3A2A21; --chip:#28322F; --ok:#7FBE97;
  --shadow:0 1px 3px rgba(0,0,0,.35);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{background:var(--bg); color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Noto Sans JP",Meiryo,sans-serif;
  font-size:15px; line-height:1.6; -webkit-font-smoothing:antialiased;}
#app{max-width:720px; margin:0 auto; padding:0 14px 84px;}
header.top{position:sticky; top:0; z-index:20; background:var(--bg);
  padding:14px 2px 10px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--line);}
header.top h1{font-size:18px; font-weight:700; letter-spacing:.02em;}
.dot{width:9px; height:9px; border-radius:50%; background:var(--muted); margin-left:auto; flex-shrink:0;}
.dot.on{background:var(--ok);}
main{padding-top:14px;}
h2{font-size:15px; font-weight:700; letter-spacing:.04em; margin:18px 0 8px;}
.small{font-size:12.5px; color:var(--muted);}
.card{background:var(--surface); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow); padding:12px 14px; margin-bottom:10px;}
button{font:inherit; cursor:pointer; border:none; border-radius:8px; padding:8px 14px; background:var(--chip); color:var(--ink);}
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
button.primary{background:var(--accent); color:var(--accent-ink); font-weight:700;}
button.ghost{background:transparent; border:1px solid var(--line);}
button.icon{padding:6px 10px; font-size:14px; line-height:1;}
button:disabled{opacity:.45; cursor:default;}
select,input[type=text],textarea{font:inherit; color:var(--ink); background:var(--surface);
  border:1px solid var(--line); border-radius:8px; padding:7px 10px; max-width:100%;}
textarea{width:100%; min-height:90px;}
.row{display:flex; flex-wrap:wrap; gap:8px; align-items:center;}
.grow{flex:1 1 auto; min-width:0;}
nav.tabs{position:fixed; bottom:0; left:0; right:0; z-index:30; background:var(--surface); border-top:1px solid var(--line); display:flex; justify-content:center;}
nav.tabs .inner{display:flex; width:100%; max-width:720px;}
nav.tabs button{flex:1; background:none; border-radius:0; padding:10px 0 12px; font-size:11.5px; color:var(--muted); display:flex; flex-direction:column; gap:2px; align-items:center;}
nav.tabs button .ic{font-size:18px; line-height:1;}
nav.tabs button.on{color:var(--accent); font-weight:700;}
/* symbols */
.sym{width:40px; height:40px; stroke:currentColor; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; display:block;}
.sym text{fill:currentColor; stroke:none; font-size:13px; font-weight:700; font-family:inherit;}
.sym .fill{fill:currentColor; stroke:none;}
.symbtn{display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 6px 5px; background:var(--surface); border:1.5px solid var(--line); border-radius:10px; min-width:64px;}
.symbtn .lb{font-size:10.5px; color:var(--muted); line-height:1.2; text-align:center;}
.symbtn.on{border-color:var(--accent); background:var(--accent-soft); color:var(--accent);}
.symbtn.on .lb{color:var(--accent); font-weight:700;}
.symgrid{display:flex; flex-wrap:wrap; gap:7px;}
.grp-title{font-size:12.5px; font-weight:700; color:var(--muted); letter-spacing:.08em; margin:14px 0 6px; display:flex; align-items:center; gap:8px;}
.grp-title::after{content:""; flex:1; height:1px; background:var(--line);}
.chips{display:flex; flex-wrap:wrap; gap:6px;}
.chip{display:inline-block; font-size:12px; padding:3px 10px; border-radius:999px; background:var(--chip); color:var(--ink); letter-spacing:.02em;}
.chip.ng{background:var(--warn-soft); color:var(--warn); font-weight:700;}
.chip.ok{background:var(--accent-soft); color:var(--accent); font-weight:700;}
.warnbox{background:var(--warn-soft); border-radius:8px; padding:8px 12px; font-size:13px; margin-top:8px;}
.detrow{display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid var(--line);}
.detrow:last-child{border-bottom:none;}
.detrow .m{flex:1; font-size:13.5px;}
.detrow .m .t{font-weight:700; font-size:13px;}
/* closet */
.item{display:flex; align-items:center; gap:10px; padding:10px 2px; border-bottom:1px solid var(--line);}
.item:last-child{border-bottom:none;}
.item .nm{flex:1; min-width:0; background:none; border:none; padding:0; font:inherit; text-align:left; color:var(--ink);}
.item .nm .t{font-weight:600;}
.item .nm .s{font-size:12px; color:var(--muted);}
.item input[type=checkbox]{width:20px; height:20px; accent-color:var(--accent); flex-shrink:0;}
.who{display:inline-block; width:10px; height:10px; border-radius:50%;}
.who.a{background:#B4643C;} .who.b{background:#4A7FA5;}
.who.ab{background:linear-gradient(90deg,#B4643C 50%,#4A7FA5 50%);}
.thumb{width:44px; height:44px; border-radius:8px; object-fit:cover; border:1px solid var(--line); flex-shrink:0;}
.thumb.lg{width:72px; height:72px;}
.typechip{font-size:11px; padding:1px 8px; border-radius:999px; background:var(--chip); color:var(--muted);}
/* modal */
.overlay{position:fixed; inset:0; background:rgba(10,16,16,.45); z-index:40; display:flex; align-items:flex-end; justify-content:center;}
.sheet{background:var(--surface); width:100%; max-width:720px; max-height:88vh; border-radius:14px 14px 0 0; padding:16px 16px 24px; overflow-y:auto;}
.sheet h3{font-size:15px; margin-bottom:10px;}
.f-row{margin-bottom:12px;}
.f-row .lbl{font-size:12.5px; color:var(--muted); font-weight:700; letter-spacing:.05em; margin-bottom:5px;}
.seg{display:flex; flex-wrap:wrap; gap:6px;}
.seg button{padding:6px 12px; font-size:13px; border:1px solid var(--line); background:var(--surface);}
.seg button.on{background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:700;}
details{margin-top:8px;}
details summary{cursor:pointer; font-size:13.5px; padding:4px 0; font-weight:600;}
.article h4{font-size:14px; margin:12px 0 4px;}
.article p, .article li{font-size:13.5px;}
.article ul{padding-left:1.3em;}
</style>

<div id="app">
  <header class="top"><h1>せんたくタグ</h1><span class="dot" id="syncDot"></span></header>
  <main>
    <section id="tab-check"></section>
    <section id="tab-closet" hidden></section>
    <section id="tab-wash" hidden></section>
    <section id="tab-tips" hidden></section>
    <section id="tab-settings" hidden></section>
  </main>
</div>
<nav class="tabs"><div class="inner">
  <button data-tab="check" class="on"><span class="ic">🔍</span>調べる</button>
  <button data-tab="closet"><span class="ic">👕</span>クローゼット</button>
  <button data-tab="wash"><span class="ic">🧺</span>今日の洗濯</button>
  <button data-tab="tips"><span class="ic">💡</span>コツ</button>
  <button data-tab="settings"><span class="ic">⚙️</span>設定</button>
</div></nav>
<div id="modal"></div>
<input type="file" id="photoInput" accept="image/*" hidden>

<script>
"use strict";
/* ============ 洗濯記号(JIS L0001) ============ */
function svgWrap(inner, cross){
  return `<svg class="sym" viewBox="0 0 44 44" aria-hidden="true">${inner}
    ${cross?'<line x1="7" y1="7" x2="37" y2="37"/><line x1="37" y1="7" x2="7" y2="37"/>':''}</svg>`;
}
function tubSvg(temp, bars, hand, cross){
  let s = `<path d="M6 13 L11 36 H33 L38 13"/><path d="M5 13 Q13 18 22 13 Q31 8 39 13"/>`;
  if(temp) s += `<text x="22" y="30" text-anchor="middle">${temp}</text>`;
  if(hand) s += `<path d="M26 3 v9 M29 3 v9 M32 5 v7 M23 5 v7 M23 12 h9"/>`;
  if(bars>=1) s += `<line x1="10" y1="40" x2="34" y2="40"/>`;
  if(bars>=2) s += `<line x1="12" y1="43" x2="32" y2="43"/>`;
  return svgWrap(s, cross);
}
function triSvg(o2, cross){
  let s = `<polygon points="22,7 40,37 4,37"/>`;
  if(o2) s += `<line x1="15" y1="31" x2="22" y2="18"/><line x1="21" y1="33" x2="28" y2="20"/>`;
  return svgWrap(s, cross);
}
function tumbleSvg(dots, cross){
  let s = `<rect x="6" y="6" width="32" height="32" rx="2"/><circle cx="22" cy="22" r="12"/>`;
  if(dots===1) s += `<circle class="fill" cx="22" cy="22" r="2.6"/>`;
  if(dots===2) s += `<circle class="fill" cx="17" cy="22" r="2.6"/><circle class="fill" cx="27" cy="22" r="2.6"/>`;
  return svgWrap(s, cross);
}
function drySvg(kind, shade){
  let s = `<rect x="6" y="6" width="32" height="32" rx="2"/>`;
  if(kind==="line") s += `<line x1="22" y1="10" x2="22" y2="34"/>`;
  if(kind==="wetline") s += `<line x1="18" y1="10" x2="18" y2="34"/><line x1="26" y1="10" x2="26" y2="34"/>`;
  if(kind==="flat") s += `<line x1="10" y1="22" x2="34" y2="22"/>`;
  if(kind==="wetflat") s += `<line x1="10" y1="18" x2="34" y2="18"/><line x1="10" y1="26" x2="34" y2="26"/>`;
  if(shade) s += `<line x1="8" y1="13" x2="13" y2="8"/><line x1="8" y1="19" x2="19" y2="8"/>`;
  return svgWrap(s, false);
}
function ironSvg(dots, cross){
  let s = `<path d="M7 33 H39 C38 22 30 15 19 15 H15 L11 24 C10 27 8 30 7 33 Z"/>`;
  const dy=27, dx=[[23],[19,27],[15,23,31]][dots-1]||[];
  let d=""; dx.forEach(x=>{ d+=`<circle class="fill" cx="${x}" cy="${dy}" r="2.2"/>`; });
  return svgWrap(s+(cross?"":d), cross);
}
function circleSvg(letter, cross){
  let s = `<circle cx="22" cy="22" r="16"/>`;
  if(letter) s += `<text x="22" y="27" text-anchor="middle">${letter}</text>`;
  return svgWrap(s, cross);
}

/* code: {g:グループ, l:短いラベル, m:正式な意味, svg} */
const SYM = {
  w95:{g:"wash", l:"95℃まで", m:"液温95℃を限度に洗濯機で洗える(通常の強さ)", svg:tubSvg(95,0)},
  w60:{g:"wash", l:"60℃まで", m:"液温60℃を限度に洗濯機で洗える(通常の強さ)", svg:tubSvg(60,0)},
  w50:{g:"wash", l:"50℃まで", m:"液温50℃を限度に洗濯機で洗える(通常の強さ)", svg:tubSvg(50,0)},
  w40:{g:"wash", l:"40℃ 標準", m:"液温40℃を限度に洗濯機で洗える(通常の強さ)", svg:tubSvg(40,0)},
  w40s:{g:"wash", l:"40℃ 弱", m:"液温40℃を限度に、弱い水流(おしゃれ着コース等)で洗う", svg:tubSvg(40,1)},
  w40ss:{g:"wash", l:"40℃ 非常に弱", m:"液温40℃を限度に、非常に弱い水流で洗う", svg:tubSvg(40,2)},
  w30:{g:"wash", l:"30℃ 標準", m:"液温30℃を限度に洗濯機で洗える(通常の強さ)", svg:tubSvg(30,0)},
  w30s:{g:"wash", l:"30℃ 弱", m:"液温30℃を限度に、弱い水流で洗う", svg:tubSvg(30,1)},
  w30ss:{g:"wash", l:"30℃ 非常に弱", m:"液温30℃を限度に、非常に弱い水流で洗う", svg:tubSvg(30,2)},
  hw:{g:"wash", l:"手洗い", m:"40℃以下の液温で、やさしく手洗いする(洗濯機は手洗いコースのみ)", svg:tubSvg(null,0,true)},
  nw:{g:"wash", l:"洗濯不可", m:"家庭での洗濯はできない", svg:tubSvg(null,0,false,true)},
  blAll:{g:"bleach", l:"漂白OK", m:"塩素系・酸素系どちらの漂白剤も使える", svg:triSvg(false)},
  blO2:{g:"bleach", l:"酸素系のみ", m:"酸素系漂白剤は使えるが、塩素系は使えない", svg:triSvg(true)},
  blNo:{g:"bleach", l:"漂白不可", m:"漂白剤は使えない", svg:triSvg(false,true)},
  tdHigh:{g:"tumble", l:"乾燥機OK(高温)", m:"タンブル乾燥ができる(排気温度80℃上限)", svg:tumbleSvg(2)},
  tdLow:{g:"tumble", l:"乾燥機OK(低温)", m:"低い温度でタンブル乾燥ができる(排気温度60℃上限)", svg:tumbleSvg(1)},
  tdNo:{g:"tumble", l:"乾燥機NG", m:"タンブル乾燥(乾燥機)は使えない", svg:tumbleSvg(0,true)},
  ndLine:{g:"dry", l:"つり干し", m:"ハンガー等につるして干す", svg:drySvg("line")},
  ndLineSh:{g:"dry", l:"陰でつり干し", m:"直射日光を避け、陰でつるして干す", svg:drySvg("line",true)},
  ndWetLine:{g:"dry", l:"濡れつり干し", m:"脱水せず、濡れたままつるして干す(しわ防止)", svg:drySvg("wetline")},
  ndFlat:{g:"dry", l:"平干し", m:"平らな場所に広げて干す(型崩れ防止)", svg:drySvg("flat")},
  ndFlatSh:{g:"dry", l:"陰で平干し", m:"直射日光を避け、陰で平干しする", svg:drySvg("flat",true)},
  ndWetFlat:{g:"dry", l:"濡れ平干し", m:"脱水せず、濡れたまま平干しする", svg:drySvg("wetflat")},
  ir200:{g:"iron", l:"アイロン高温", m:"200℃を限度にアイロンできる", svg:ironSvg(3)},
  ir150:{g:"iron", l:"アイロン中温", m:"150℃を限度にアイロンできる", svg:ironSvg(2)},
  ir110:{g:"iron", l:"アイロン低温", m:"110℃を限度に、スチームなしでアイロンできる", svg:ironSvg(1)},
  irNo:{g:"iron", l:"アイロン不可", m:"アイロンはかけられない", svg:ironSvg(0,true)},
  dcP:{g:"clean", l:"ドライP", m:"パークロロエチレン等でドライクリーニングできる(クリーニング店向け)", svg:circleSvg("P")},
  dcF:{g:"clean", l:"ドライF", m:"石油系溶剤でドライクリーニングできる(クリーニング店向け)", svg:circleSvg("F")},
  dcNo:{g:"clean", l:"ドライ不可", m:"ドライクリーニングはできない", svg:circleSvg("",true)}
};
const GROUPS = [["wash","洗い方"],["bleach","漂白"],["tumble","乾燥機(タンブル)"],["dry","干し方"],["iron","アイロン"],["clean","クリーニング"]];

/* ============ 素材の注意 ============ */
const MAT_NOTES = [
 [/綿|コットン|cotton/i,"綿: 乾燥機の高温で縮みやすい。タオルは低温か、8割乾燥→干し仕上げが長持ちのコツ"],
 [/ポリエステル|polyester/i,"ポリエステル: 糸くずや毛玉を拾いやすい。タオル・フリースと一緒に洗わない"],
 [/ウール|毛|wool/i,"ウール: 水と摩擦で縮む(フェルト化)。弱コース+ネット、平干しが安心"],
 [/レーヨン|rayon|ビスコース/i,"レーヨン: 水に弱く縮みやすい。手洗いか非常に弱いコースで短時間"],
 [/ナイロン|nylon/i,"ナイロン: 熱に弱い。乾燥機・高温アイロンは避ける"],
 [/アクリル|acrylic/i,"アクリル: 毛玉ができやすい。裏返し+ネットで洗う"],
 [/麻|リネン|linen/i,"麻: しわになりやすい。脱水短め、形を整えて干す"],
 [/フリース|起毛|ボア/i,"起毛素材: 糸くずが出やすく拾いやすい。単独かネットで洗う"],
 [/シルク|絹|silk/i,"シルク: 非常にデリケート。手洗いか、クリーニング推奨"],
 [/ポリウレタン|スパンデックス/i,"ポリウレタン: 熱と塩素系漂白剤で劣化。乾燥機は避ける"]
];
function matNotes(mat){
  if(!mat) return [];
  return MAT_NOTES.filter(([re])=>re.test(mat)).map(([,n])=>n);
}

/* ============ アドバイス生成 ============ */
function washInfo(sym){
  const s = new Set(sym||[]);
  const w = [...s].find(c=>SYM[c]&&SYM[c].g==="wash");
  const info = {washCat:"unknown", temp:null, weak:false, chips:[], warns:[]};
  if(w==="nw"){ info.washCat="no"; }
  else if(w==="hw"){ info.washCat="hand"; }
  else if(w){ info.washCat="machine"; info.temp=parseInt(w.slice(1)); info.weak=/s$/.test(w); }
  return info;
}
function advice(item){
  const s = new Set(item.sym||[]);
  const wi = washInfo(item.sym);
  const chips=[], warns=[];
  // 洗い
  if(wi.washCat==="no"){ chips.push(["ng","家庭で洗えない(クリーニングへ)"]); }
  else if(wi.washCat==="hand"){ chips.push(["ng","手洗い(または手洗いコース)"]); }
  else if(wi.washCat==="machine"){
    chips.push(["ok",`洗濯機OK(${wi.temp}℃まで)`]);
    if(wi.weak) chips.push(["ng","弱コース+ネット"]);
  } else { chips.push(["","洗い方の記号未登録"]); }
  // 乾燥機
  if(s.has("tdNo")) chips.push(["ng","乾燥機NG"]);
  else if(s.has("tdLow")) chips.push(["ok","乾燥機OK(低温)"]);
  else if(s.has("tdHigh")) chips.push(["ok","乾燥機OK"]);
  else if(wi.washCat!=="no") chips.push(["","乾燥機表示なし→避けるのが安全"]);
  // 干し方
  if(s.has("ndLine")) chips.push(["","つり干しでOK"]);
  ["ndLineSh","ndFlatSh"].some(c=>s.has(c)) && chips.push(["ng","陰干し"]);
  s.has("ndFlat")||s.has("ndFlatSh")||s.has("ndWetFlat") ? chips.push(["","平干し(型崩れ防止)"]) : null;
  s.has("ndWetLine")||s.has("ndWetFlat") ? chips.push(["","脱水せず濡れ干し"]) : null;
  // 漂白
  if(s.has("blNo")) chips.push(["ng","漂白NG"]);
  else if(s.has("blO2")) chips.push(["","漂白は酸素系のみ"]);
  else if(s.has("blAll")) chips.push(["ok","漂白OK(塩素系・酸素系)"]);
  // アイロン
  if(s.has("irNo")) chips.push(["ng","アイロン不可"]);
  else if(s.has("ir110")) chips.push(["","アイロンは低温(110℃)まで・スチームNG"]);
  else if(s.has("ir150")) chips.push(["","アイロンは中温(150℃)まで"]);
  else if(s.has("ir200")) chips.push(["ok","アイロンOK(高温200℃まで)"]);
  // クリーニング
  if(s.has("dcNo")) chips.push(["ng","ドライクリーニング不可"]);
  else if(s.has("dcP")) chips.push(["ok","クリーニング店に出せる(P)"]);
  else if(s.has("dcF")) chips.push(["ok","クリーニング店に出せる(F・石油系)"]);
  // タオルと素材の注意
  if(item.type==="towel"){
    warns.push("タオルは糸くずが出るので、服(特に黒い服・化繊)とは分けて洗うのがおすすめ");
    if(s.has("tdHigh")||s.has("tdLow")) warns.push("乾燥機は低温で。高温を繰り返すとパイルが傷んでゴワゴワ・ボロボロの原因に");
  }
  matNotes(item.mat).forEach(n=>warns.push(n));
  return {chips, warns};
}
/* 今日の洗濯: グループ分け */
function classify(item){
  const wi = washInfo(item.sym);
  if(wi.washCat==="no") return "nowash";
  if(wi.washCat==="hand") return "hand";
  if(item.type==="towel") return "towel";
  if(wi.weak || wi.washCat==="unknown") return "weak";
  return "normal";
}

  hand:["④ 手洗い","洗面器で押し洗い、または洗濯機の手洗いコース"],

function lintTag(item){ // 糸くずを「出す」「拾う」

}

/* ---- Firebase(やることアプリと同じ仕組み) ---- */
function loadFirebaseSdk(cb){
  if(window.firebase&&firebase.database){ cb(); return; }
  const s1=document.createElement("script");
  s1.src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js";
  s1.onload=()=>{ const s2=document.createElement("script");
    s2.src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js";
    s2.onload=cb; s2.onerror=()=>setStatus(false); document.head.appendChild(s2); };
  s1.onerror=()=>setStatus(false);
  document.head.appendChild(s1);
}
function connect(){
  if(!syncOn()) return;
  loadFirebaseSdk(()=>{
    try{
      if(!firebase.apps.length) firebase.initializeApp(S.settings.cfg);
      const db=firebase.database();
      fbRef=db.ref("closet/"+S.settings.rid);
      fbRef.on("value",snap=>{ ROOM=snap.val()||{}; if(!ROOM.meta) ROOM.meta={names:{a:"夫",b:"妻"}};
        S.mirror=ROOM; save(); render(); });
      db.ref(".info/connected").on("value",s=>{ connected=!!s.val(); setStatus(connected); });
    }catch(e){ alert("同期の接続に失敗しました: "+e.message); }
  });
}

function parseConfig(text){
  const cfg={}; const re=/["']?(\w+)["']?\s*:\s*["']([^"']+)["']/g; let m;
  while((m=re.exec(text))) cfg[m[1]]=m[2];
  if(!cfg.apiKey||!cfg.projectId) return null;
  if(!cfg.databaseURL){ const u=text.match(/https:\/\/[\w.-]+firebasedatabase\.app/); if(u) cfg.databaseURL=u[0]; else return {noDb:true}; }
  return {cfg};
}

/* ============ アイテム写真(端末内で縮小して保存) ============ */
function fileToThumb(file, max){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      const sc=Math.min(1, max/Math.max(img.width,img.height));
      const cv=document.createElement("canvas");
      cv.width=Math.max(1,Math.round(img.width*sc)); cv.height=Math.max(1,Math.round(img.height*sc));
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      URL.revokeObjectURL(img.src);
      resolve(cv.toDataURL("image/jpeg",0.65));
    };
    img.onerror=()=>{ URL.revokeObjectURL(img.src); reject(new Error("画像を読み込めませんでした")); };
    img.src=URL.createObjectURL(file);
  });
}

  if(wi.washCat==="no") parts.push("洗濯不可");
  else if(wi.washCat==="hand") parts.push("手洗い");

let sel=new Set();
function renderWash(){
  const el=$("#tab-wash");
  const all=Object.entries(items());
  if(!all.length){
    el.innerHTML=`<div class="card"><p class="small">クローゼットに登録すると、ここで「今日洗うもの」を選んで洗濯機ごとのグループ分けができます。</p></div>`;

  }
  let html=`<p class="small" style="margin-bottom:8px">今日洗うものにチェックを入れると、洗濯機を回す単位に自動で分かれます。</p>
    <div class="row" style="margin-bottom:8px">
      <button class="ghost icon" id="selAll">全部選ぶ</button>
      <button class="ghost icon" id="selNone">全部外す</button>
      <span class="small grow" style="text-align:right">${sel.size}点 選択中</span>
    </div><div class="card">`;
  all.sort((a,b)=>(b[1].created||0)-(a[1].created||0)).forEach(([id,it])=>{
    html+=`<div class="item">
      <input type="checkbox" data-sel="${id}" ${sel.has(id)?"checked":""}>
      ${thumbImg(it.photo)}
      <button class="nm" data-open="${id}"><div class="t">${esc(it.name)} <span class="typechip">${TYPE_LABEL[it.type]||"他"}</span></div>
      <div class="s">${esc(itemSub(it))}</div></button>
    </div>`;
  });
  html+=`</div>`;

  if(sel.size){
    const groups={};
    [...sel].forEach(id=>{ const it=items()[id]; if(!it) return;
      const c=classify(it); (groups[c]=groups[c]||[]).push([id,it]); });
    html+=`<h2>今日の洗濯プラン</h2>`;
    ["normal","weak","towel","hand","nowash"].forEach(g=>{
      const its=groups[g]; if(!its||!its.length) return;
      const [title,subt]=LOAD_LABELS[g];
      const dryOK=its.filter(([,it])=>{const s=new Set(it.sym||[]);return s.has("tdHigh")||s.has("tdLow");});
      const dryNG=its.filter(([,it])=>{const s=new Set(it.sym||[]);return !s.has("tdHigh")&&!s.has("tdLow");});
      html+=`<div class="card"><b>${title}</b> <span class="small">(${its.length}点)</span>
        <p class="small">${subt}</p>
        <p style="margin-top:6px">${its.map(([,it])=>esc(it.name)).join("、")}</p>`;
      if(g!=="nowash"){
        if(dryOK.length) html+=`<p class="small" style="margin-top:6px">🌀 乾燥機OK: ${dryOK.map(([,it])=>esc(it.name)).join("、")}${g==="towel"?"(低温推奨)":""}</p>`;
        if(dryNG.length) html+=`<p class="small">🚫 乾燥機NG・干す: ${dryNG.map(([,it])=>esc(it.name)).join("、")}</p>`;
      }
      /* 糸くず警告 */
      if(g==="normal"||g==="weak"){
        const outs=its.filter(([,it])=>lintTag(it).out);
        if(outs.length) html+=`<div class="warnbox">⚠ ${outs.map(([,it])=>esc(it.name)).join("、")} は糸くずが出やすいものです。黒い服・化繊と同じ回は避けるか、ネットに入れてください。</div>`;
      }
      html+=`</div>`;
    });
    if(groups.towel && (groups.normal||groups.weak)){
      html+=`<p class="small">💡 タオルの回を最後にすると、洗濯槽に残った糸くずが服につきにくくなります。</p>`;
    }
  }
  el.innerHTML=html;
  el.querySelectorAll("[data-sel]").forEach(c=>c.onchange=()=>{ c.checked?sel.add(c.dataset.sel):sel.delete(c.dataset.sel); renderWash(); });
  el.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>openItemSheet(b.dataset.open));
  $("#selAll").onclick=()=>{ Object.keys(items()).forEach(id=>sel.add(id)); renderWash(); };
  $("#selNone").onclick=()=>{ sel.clear(); renderWash(); };
}

   <li><b>干す前に10回ほど振る</b>: パイルが立ってふわっと仕上がります。</li>
   <li><b>乾燥機は低温で</b>: 高温の繰り返しは綿が縮み、生地が傷む最大の原因。8割乾かして最後は干すのが理想。</li>
   <li>ゴワゴワが戻らない・端がほつれたら替えどき。新しいタオルは最初に一度洗ってから使うと毛羽が落ちます。</li></ul>`},
 {t:"服に糸くずをつけない洗い方", b:`<ul>
   <li>糸くずを<b>出す側</b>: タオル・フリース・起毛・新しい綿製品。<b>拾う側</b>: 黒い服・ポリエステルなど化繊。</li>
   <li><b>出す側と拾う側を同じ回で洗わない</b>のが一番効きます(このアプリの仕分けはタオルを自動で別グループにします)。</li>
   <li>拾いやすい服は<b>裏返し+洗濯ネット</b>に。</li>
   <li><b>糸くずフィルター(洗濯槽の網)をこまめに掃除</b>。乾燥機のフィルターも毎回。</li>
   <li>ついてしまったら、乾いた状態でエチケットブラシかコロコロで。</li></ul>`},
 {t:"縮み・型崩れを防ぐ", b:`<ul>
   <li>タグの<b>温度表示以下</b>の水温で。縮みの多くは「高温+乾燥機」が原因です。</li>
   <li>「弱」表示(桶の下に線)は<b>おしゃれ着コース+ネット</b>で。</li>
   <li>ニットは<b>平干し</b>(ハンガーだと伸びます)。</li>
   <li>乾燥機表示がないものは乾燥機に入れないのが安全。</li></ul>`},
 {t:"色移りを防ぐ", b:`<ul>
   <li>濃い色の新品は<b>最初の2〜3回は単独洗い</b>。</li>
   <li>洗濯後に<b>濡れたまま放置しない</b>(色移りとにおいの原因)。すぐ干す。</li>
   <li>白物の漂白は表示を確認: 三角に×は漂白NG、斜線2本は<b>酸素系のみOK</b>(塩素系NG)。</li></ul>`},
 {t:"洗濯ネットの使い方", b:`<ul>
   <li><b>1つのネットに1枚</b>が基本。詰めると洗浄力が落ちます。</li>
   <li>ファスナー・ホックは<b>閉じてから</b>入れる(他の服とタオルを守る)。</li>
   <li>装飾つき・レース・ストッキング・ブラはネット必須。</li>
   <li>畳んでネットに入れると型崩れ防止に。</li></ul>`}
];
function renderTips(){
  const el=$("#tab-tips");
  el.innerHTML = `<p class="small" style="margin-bottom:8px">お悩み別のコツ集です。</p>`+
    TIPS.map((a,i)=>`<div class="card article"><details ${i===0?"open":""}><summary>${esc(a.t)}</summary>${a.b}</details></div>`).join("")+
    `<div class="card article"><details><summary>洗濯表示の早見表(全記号)</summary>
      ${GROUPS.map(([g,gl])=>`<h4>${gl}</h4>`+Object.entries(SYM).filter(([,s])=>s.g===g)
        .map(([c,s])=>`<div class="detrow">${s.svg}<div class="m"><div class="t">${esc(s.l)}</div>${esc(s.m)}</div></div>`).join("")).join("")}
    </details></div>`;
}

/* ============ 設定 ============ */
function renderSettings(){
  const el=$("#tab-settings");
  const n=names(); const sync=syncOn();
  el.innerHTML=`
  <div class="card">
    <h2 style="margin-top:0">ふたりの名前(持ち主表示用)</h2>
    <div class="row">
      <span class="who a"></span><input type="text" id="nameA" value="${esc(n.a)}" style="width:110px">
      <span class="who b"></span><input type="text" id="nameB" value="${esc(n.b)}" style="width:110px">
      <button id="nameSave">保存</button>
    </div>
  </div>

  <div class="card">
    <h2 style="margin-top:0">夫婦で同期 <span class="chip">近日公開</span></h2>
    ${SYNC_UI_ENABLED ? (sync?`
      <p class="small">同期は有効です。もう1台では下の招待コードを「招待コードで参加」に貼り付けてください。</p>
      <div class="row" style="margin-top:8px">
        <button id="btnInvite" class="primary">📋 招待コードをコピー</button>
        <button id="btnUnsync" class="ghost" style="color:var(--warn)">同期を解除</button>
      </div>
    `:`
      <p class="small">「きょうのやること」で作ったFirebaseがあれば、<b>同じconfigを貼るだけ</b>で使い回せます(データは別の場所に保存されます)。</p>
      <div class="f-row" style="margin-top:10px"><div class="lbl">Firebaseの構成(config)を貼り付け</div>
        <textarea id="cfgArea" placeholder='firebaseConfig をまるごと貼り付け'></textarea>
      </div>
      <div class="row"><button class="primary" id="btnNewRoom">同期を開始</button></div>
      <div class="f-row" style="margin-top:12px"><div class="lbl">もう1台のスマホはこちら</div>
        <textarea id="joinArea" placeholder="1台目でコピーした招待コードを貼り付け" style="min-height:70px"></textarea>
        <button id="btnJoin" style="margin-top:6px">招待コードで参加</button>
      </div>
    `) : `
      <p class="small">夫婦・家族でクローゼットを共有できる同期機能を準備中です。今のところは、この端末だけでご利用いただけます。</p>
    `}
  </div>

  <div class="card">
    <h2 style="margin-top:0">データ</h2>
    <div class="row">
      <button id="btnExport" class="ghost">書き出す(コピー)</button>
      <button id="btnImport" class="ghost">貼り付けて読み込む</button>
      <button id="btnReset" class="ghost" style="color:var(--warn)">全データ初期化</button>
    </div>
    <textarea id="ioArea" placeholder="書き出し結果 / 読み込み時はここに貼り付け" style="margin-top:8px"></textarea>
  </div>`;

  $("#nameSave").onclick=()=>{ mutate(["meta","names"],{a:$("#nameA").value.trim()||"夫", b:$("#nameB").value.trim()||"妻"}); if(!syncOn()) renderSettings(); };
  if(SYNC_UI_ENABLED && sync){
    $("#btnInvite").onclick=()=>copyText(inviteCode(), $("#btnInvite"), "✅ コピーしました(相手に送る)");
    $("#btnUnsync").onclick=()=>{
      if(!confirm("同期を解除しますか?(データはFirebase側に残ります)")) return;
      if(fbRef){ fbRef.off(); fbRef=null; }
      S.settings.cfg=null; S.settings.rid=null; connected=false; ROOM=S.local; save(); render();
    };
  }else if(SYNC_UI_ENABLED){
    $("#btnNewRoom").onclick=()=>{
      const p=parseConfig($("#cfgArea").value);
      if(!p){ alert("構成(config)を読み取れませんでした。firebaseConfig 全体を貼り付けてください。"); return; }
      if(p.noDb){ alert("databaseURL が見つかりません。Realtime Database作成後のconfigを貼ってください。"); return; }
      S.settings.cfg=p.cfg;
      S.settings.rid="s"+Math.random().toString(36).slice(2,10)+Math.random().toString(36).slice(2,6);
      save();
      const seed=JSON.parse(JSON.stringify(S.local));
      loadFirebaseSdk(()=>{
        try{
          if(!firebase.apps.length) firebase.initializeApp(S.settings.cfg);
          firebase.database().ref("closet/"+S.settings.rid).update(seed).then(()=>{
            connect(); alert("同期を開始しました。招待コードをコピーして相手に送ってください。"); render();
          }).catch(e=>alert("書き込みに失敗しました: "+e.message));
        }catch(e){ alert("接続に失敗しました: "+e.message); }
      });
    };
    $("#btnJoin").onclick=()=>{
      try{
        const o=JSON.parse(decodeURIComponent(escape(atob($("#joinArea").value.trim()))));
        if(!o.c||!o.r) throw 0;
        if(o.app && o.app!=="sentaku"){ alert("これは別のアプリ(きょうのやること等)の招待コードのようです。"); return; }
        S.settings.cfg=o.c; S.settings.rid=o.r; save(); connect();
        alert("参加しました。数秒でクローゼットが同期されます。"); render();
      }catch(e){ alert("招待コードを読み取れませんでした。"); }
    };
  }
  $("#btnExport").onclick=()=>{
    const t=JSON.stringify({local:syncOn()?ROOM:S.local});
    $("#ioArea").value=t; copyText(t,$("#btnExport"),"✅ コピーしました");
  };
  $("#btnImport").onclick=()=>{
    try{
      const o=JSON.parse($("#ioArea").value); if(!o.local) throw 0;
      if(syncOn()){ alert("同期中は読み込みできません。先に同期を解除してください。"); return; }
      S.local=o.local; ROOM=S.local; save(); render(); alert("読み込みました");
    }catch(e){ alert("読み込めませんでした。"); }
  };
  $("#btnReset").onclick=()=>{
    if(confirm("この端末のデータと設定をすべて消します。よろしいですか?")){
      localStorage.removeItem(KEY); location.reload();
    }
  };
}

function copyText(t,btn,doneLabel,after){
  const ok=()=>{ if(btn) btn.textContent=doneLabel; if(after) setTimeout(after,1200); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(ok).catch(()=>fb()); } else fb();
  function fb(){ const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select();
    try{ document.execCommand("copy"); ok(); }catch(e){ alert("コピーできませんでした"); } ta.remove(); }
}

/* ============ タブ・起動 ============ */
let tab="check";
document.querySelectorAll("nav.tabs button").forEach(b=>{
  b.addEventListener("click",()=>{ tab=b.dataset.tab; render(); });
});
function render(){
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  ["check","closet","wash","tips","settings"].forEach(t=>{ $("#tab-"+t).hidden=(t!==tab); });
  if(tab==="check") renderCheck();
  if(tab==="closet") renderCloset();
  if(tab==="wash") renderWash();
  if(tab==="tips") renderTips();
  if(tab==="settings") renderSettings();
  setStatus(connected);
}
if(syncOn()){ if(S.mirror) ROOM=S.mirror; connect(); }
else ROOM=S.local;
render();
</script>
<script>
if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js");
</script>
</body>
</html>
