<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和の深呼吸｜呼吸法ガイド</title>
<meta name="description" content="4-7-8呼吸・ボックス呼吸を円のアニメーションで誘導する和風の呼吸法ガイド。寝る前や集中前のリセットに。和風Lo-fi BGM付き。">
<style>
  :root{
    --bg:#141b2b; --panel:#1d2639; --panel2:#232f47;
    --ink:#ece6d9; --muted:#8b93a5; --accent:#d9a86b; --accent2:#e8c48f;
    --line:#32405e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:radial-gradient(1200px 800px at 70% -10%, #1d2a45 0%, var(--bg) 55%);
    color:var(--ink);
    font-family:"Yu Mincho","Hiragino Mincho ProN","Noto Serif JP",serif;
    min-height:100vh; padding:24px 16px 60px;
  }
  .wrap{max-width:560px;margin:0 auto;text-align:center}
  h1{font-size:1.8rem;letter-spacing:.35em;text-indent:.35em;color:var(--accent2);margin-bottom:8px}
  .sub{color:var(--muted);font-size:.85rem;margin-bottom:24px;letter-spacing:.1em}
  .mode-row,.len-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
  button{
    background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:10px;padding:10px 16px;font-family:inherit;font-size:.95rem;cursor:pointer
  }
  button:hover{border-color:var(--accent)}
  button.on{background:var(--accent);color:#1a1408;border-color:var(--accent)}
  button.primary{background:var(--accent);color:#1a1408;font-weight:bold;letter-spacing:.2em;padding:12px 40px;font-size:1.05rem}
  /* 円窓 */
  .stage{position:relative;width:300px;height:300px;margin:26px auto}
  .ring{position:absolute;inset:0;border:1px solid var(--line);border-radius:50%}
  .moon{
    position:absolute;left:50%;top:50%;width:230px;height:230px;border-radius:50%;
    background:radial-gradient(circle at 38% 35%, #f4ead2 0%, #e2cd9e 45%, #c9a76a 100%);
    transform:translate(-50%,-50%) scale(0.55);
    box-shadow:0 0 60px rgba(217,168,107,.35);
    transition:transform .3s linear;
  }
  .phase{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    color:#1a1408;font-size:1.25rem;letter-spacing:.3em;text-indent:.3em;font-weight:bold;
    text-shadow:0 0 8px rgba(244,234,210,.6);
  }
  .count{position:absolute;left:50%;bottom:-8px;transform:translateX(-50%);color:var(--accent2);font-size:1rem;letter-spacing:.2em}
  #sessionLeft{color:var(--muted);font-size:.85rem;margin-top:8px;min-height:1.5em}
  .bgm-row{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:22px;color:var(--muted);font-size:.9rem}
  input[type=range]{accent-color:var(--accent);width:130px}
  footer{text-align:center;color:var(--muted);font-size:.78rem;line-height:2;margin-top:34px}
  footer a{color:var(--accent2)}
  .desc{color:var(--muted);font-size:.82rem;line-height:1.9;margin-top:18px;text-align:left;
        background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
</style>
</head>
<body>
<div class="wrap">
  <h1>和の深呼吸</h1>
  <div class="sub">― 月とともに、ゆっくり息を整える ―</div>

  <div class="mode-row">
    <button class="mode-btn on" data-mode="478">4-7-8呼吸（おやすみ前）</button>
    <button class="mode-btn" data-mode="box">ボックス呼吸（集中前）</button>
    <button class="mode-btn" data-mode="slow">ゆっくり呼吸（リラックス）</button>
  </div>
  <div class="len-row">
    <button class="len-btn" data-len="1">1分</button>
    <button class="len-btn on" data-len="3">3分</button>
    <button class="len-btn" data-len="5">5分</button>
  </div>

  <div class="stage">
    <div class="ring"></div>
    <div class="moon" id="moon"></div>
    <div class="phase" id="phase">はじめる</div>
    <div class="count" id="count"></div>
  </div>
  <div id="sessionLeft"></div>

  <button class="primary" id="btnStart">はじめる</button>

  <div class="bgm-row">
    <span>BGM</span>
    <button id="bgmBtn">OFF</button>
    <input type="range" id="bgmVol" min="0" max="100" value="45">
  </div>

  <div class="desc">
    <b>4-7-8呼吸</b>：4秒吸って、7秒止めて、8秒かけて吐く。寝つきを良くしたいときに。<br>
    <b>ボックス呼吸</b>：4秒ずつ「吸う→止める→吐く→止める」。緊張をほどいて集中したいときに。<br>
    <b>ゆっくり呼吸</b>：5秒吸って5秒吐くだけ。何も考えずに月を眺めてください。<br>
    ※体調が優れないときは無理をせず中断してください。
  </div>

  <footer>
    BGMはSuno AIで制作したオリジナル曲「夜の帳の奥」（夜の縁側シリーズ）です。<br>
    長時間の睡眠・作業用BGMは <a href="https://www.youtube.com/@Chill_music_RinRin" target="_blank" rel="noopener">YouTube「Chill music Rin Rin」</a> でどうぞ。<br>
    © りんね☆ブログ
  </footer>
</div>

<script>
"use strict";
/* ============ 設定 ============
   呼吸パターン: [フェーズ名, 秒数, 月のスケール目標] の繰り返し。
   BGMは audio/yoru.mp3（差し替えはここを編集）。 */
const MODES = {
  "478":  [["吸って",4,1],["止めて",7,1],["吐いて",8,0.55]],
  "box":  [["吸って",4,1],["止めて",4,1],["吐いて",4,0.55],["止めて",4,0.55]],
  "slow": [["吸って",5,1],["吐いて",5,0.55]],
};
const BGM_FILE = "audio/yoru.mp3";
/* ============================== */

let mode = "478", lenMin = 3;
let running = false, timer = null, sessionEnd = 0;
const moon = document.getElementById("moon");
const phaseEl = document.getElementById("phase");
const countEl = document.getElementById("count");
const leftEl = document.getElementById("sessionLeft");
const btnStart = document.getElementById("btnStart");

document.querySelectorAll(".mode-btn").forEach(b => b.onclick = () => {
  document.querySelectorAll(".mode-btn").forEach(x => x.classList.remove("on"));
  b.classList.add("on"); mode = b.dataset.mode; stop();
});
document.querySelectorAll(".len-btn").forEach(b => b.onclick = () => {
  document.querySelectorAll(".len-btn").forEach(x => x.classList.remove("on"));
  b.classList.add("on"); lenMin = parseInt(b.dataset.len, 10);
});

// ---- 鈴の音（フェーズ替わりの合図・Web Audioで合成） ----
let ctx = null;
function bell(){
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (ctx.state === "suspended") ctx.resume();
  const t = ctx.currentTime;
  [[2093,0.12],[4186,0.04]].forEach(([f, amp]) => {
    const o = ctx.createOscillator(); o.type = "sine"; o.frequency.value = f;
    const g = ctx.createGain();
    g.gain.setValueAtTime(amp, t);
    g.gain.exponentialRampToValueAtTime(0.0005, t + 1.6);
    o.connect(g).connect(ctx.destination); o.start(t); o.stop(t + 2);
  });
}

// ---- 呼吸ループ ----
function start(){
  running = true; btnStart.textContent = "やめる";
  sessionEnd = Date.now() + lenMin * 60000;
  runPhase(0);
}
function stop(){
  running = false; clearTimeout(timer);
  btnStart.textContent = "はじめる";
  phaseEl.textContent = "はじめる"; countEl.textContent = ""; leftEl.textContent = "";
  moon.style.transition = "transform .3s linear";
  moon.style.transform = "translate(-50%,-50%) scale(0.55)";
}
btnStart.onclick = () => running ? stop() : start();

function runPhase(i){
  if (!running) return;
  if (Date.now() >= sessionEnd){
    stop(); phaseEl.textContent = "おつかれさま"; bell();
    return;
  }
  const [label, sec, scale] = MODES[mode][i];
  phaseEl.textContent = label;
  bell();
  moon.style.transition = `transform ${sec}s cubic-bezier(.4,0,.6,1)`;
  moon.style.transform = `translate(-50%,-50%) scale(${scale})`;
  let remain = sec;
  countEl.textContent = remain;
  const cd = setInterval(() => {
    remain--;
    if (remain > 0) countEl.textContent = remain; else clearInterval(cd);
    const left = Math.max(0, sessionEnd - Date.now());
    leftEl.textContent = `のこり ${Math.floor(left/60000)}:${String(Math.floor(left%60000/1000)).padStart(2,"0")}`;
  }, 1000);
  timer = setTimeout(() => { clearInterval(cd); runPhase((i + 1) % MODES[mode].length); }, sec * 1000);
}

// ---- BGM ----
const bgm = new Audio(BGM_FILE);
bgm.loop = true; bgm.preload = "none"; bgm.volume = 0.45;
const bgmBtn = document.getElementById("bgmBtn");
const bgmVol = document.getElementById("bgmVol");
bgmBtn.onclick = () => {
  if (bgm.paused){ bgm.play().catch(()=>{}); bgmBtn.textContent = "ON"; bgmBtn.classList.add("on"); }
  else { bgm.pause(); bgmBtn.textContent = "OFF"; bgmBtn.classList.remove("on"); }
};
bgmVol.oninput = () => { bgm.volume = bgmVol.value / 100; };
</script>
</body>
</html>
